version: '3.8'

services:
  backend:
    build: ./backend
    container_name: grocery-backend
    ports:
      - "9000:9000"
    environment:
      - NODE_ENV=production
      - PORT=9000
      - MONGO_URI=${MONGO_URI}
      - MONGO_DB_NAME=${MONGO_DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - ALLOWED_ORIGINS=http://localhost,http://localhost:80,http://localhost:5173,http://localhost:8081,http://localhost:9000
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - grocery-network
    restart: unless-stopped

  frontend:
    build:
      context: ./client
      args:
        - REACT_APP_NODE_ENV=production
        - REACT_APP_SERVER_BASE_URL=http://localhost:9000
        - VITE_BACKEND_URL=http://localhost:9000
    container_name: grocery-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - grocery-network
    restart: unless-stopped

networks:
  grocery-network:
    driver: bridge