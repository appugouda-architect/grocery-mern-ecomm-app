
services:
  backend:
    build: ./backend
    container_name: grocery-backend
    ports:
      - "9000:9000"
    env_file: ./backend/.env
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - grocery-network
    restart: unless-stopped

  frontend:
    build:
      context: ./client
      args:
        - VITE_BACKEND_URL=http://backend:9000
    container_name: grocery-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - grocery-network
    # restart: unless-stopped

networks:
  grocery-network:
    driver: bridge