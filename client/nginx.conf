server {
    listen 80;
    gzip on;
    gzip_types text/plain application/javascript application/json text/css;
    gzip_min_length 1024;

    # Security headers
    add_header X-Frame-Options        SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy        strict-origin-when-cross-origin;

    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }

    # /api/* and /images/* are routed to the backend by the ALB before
    # reaching Nginx. On AWS ECS Fargate there is no shared Docker network,
    # so these proxy_pass blocks are intentionally removed.
    # For local Docker Compose, docker-compose.yml handles this via the
    # same network; the frontend container is only needed to serve the SPA.
}